basePath: /
definitions:
  model.Exam:
    properties:
      addTime:
        type: integer
      createBy:
        type: integer
      deptId:
        type: integer
      duration:
        description: 单人答题时长（分钟），0=不限
        type: integer
      endTime:
        description: 结束时间 (ms)
        type: integer
      id:
        type: integer
      maxAttempts:
        type: integer
      order:
        type: integer
      paperId:
        type: integer
      publishDepts:
        type: string
      qr:
        type: string
      showScore:
        description: 1=交卷后立即显示分数
        type: integer
      startTime:
        description: 开始时间 (ms)
        type: integer
      status:
        type: integer
      title:
        type: string
    type: object
  model.ExamPaper:
    properties:
      addTime:
        type: integer
      category:
        type: string
      createBy:
        type: integer
      deptId:
        type: integer
      description:
        type: string
      id:
        type: integer
      passScore:
        description: 及格分
        type: integer
      questionIds:
        description: JSON 数组 [1,2,3]
        type: string
      showAnswer:
        description: 1=交卷后立即显示答案
        type: integer
      shuffle:
        description: 1=题目乱序
        type: integer
      status:
        type: integer
      timeLimit:
        description: 答题时长（分钟）
        type: integer
      title:
        type: string
      totalScore:
        type: integer
    type: object
  model.ExamQuestion:
    properties:
      addTime:
        type: integer
      analysis:
        description: 解析
        type: string
      answer:
        description: 正确答案（JSON：string/[]string）
        type: string
      category:
        description: 分类
        type: string
      createBy:
        type: integer
      deptId:
        description: 归属部门
        type: integer
      difficulty:
        description: 1=易 2=中 3=难
        type: integer
      id:
        type: integer
      options:
        description: JSON 数组 [{label,value}]
        type: string
      score:
        description: 分值
        type: integer
      status:
        description: 1=启用 0=停用
        type: integer
      tags:
        description: 逗号分隔标签
        type: string
      title:
        description: 题干
        type: string
      type:
        description: input/select/radio/checkbox/textarea
        type: string
    type: object
  model.Survey:
    properties:
      addTime:
        type: integer
      allowMulti:
        description: 同一用户多次答
        type: integer
      anonymous:
        description: 0=记录用户 1=匿名
        type: integer
      category:
        description: 分类
        type: string
      cover:
        description: 封面
        type: string
      createBy:
        type: integer
      deptId:
        type: integer
      deptIds:
        description: 部门限定时的可见部门
        type: string
      description:
        description: 描述
        type: string
      editTime:
        type: integer
      endTime:
        description: ms
        type: integer
      id:
        type: integer
      maxResponse:
        description: 0=不限
        type: integer
      mode:
        description: survey/exam
        type: string
      order:
        type: integer
      qr:
        description: 二维码 URL
        type: string
      settings:
        description: 答题/提交/考试 设置（JSON 对象，参考 SurveyKing ProjectSetting）
        type: string
      showResult:
        description: 0=否 1=提交后可见
        type: integer
      startTime:
        description: ms
        type: integer
      status:
        description: 1=发布 0=停用
        type: integer
      tags:
        description: 标签 (逗号)
        type: string
      title:
        description: 标题
        type: string
      visibility:
        description: 0=公开链接 1=登录可见 2=部门限定
        type: integer
    type: object
  model.SurveyChannel:
    properties:
      addTime:
        type: integer
      extra:
        description: 渠道额外参数
        type: string
      id:
        type: integer
      name:
        type: string
      status:
        type: integer
      submitCnt:
        type: integer
      surveyId:
        type: integer
      type:
        description: link/qr/embed/shorturl
        type: string
      url:
        type: string
      visitCnt:
        type: integer
    type: object
  response.Resp:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
